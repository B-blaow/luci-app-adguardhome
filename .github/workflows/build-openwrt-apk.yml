name: Build OpenWrt luci-app-adguardhome APK

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - v2
      - master
    paths:
      - '.github/workflows/build-openwrt-apk.yml'
      - 'Makefile'
      - 'luasrc/**'
      - 'po/**'
      - 'root/**'
  pull_request:
    paths:
      - '.github/workflows/build-openwrt-apk.yml'
      - 'Makefile'
      - 'luasrc/**'
      - 'po/**'
      - 'root/**'

env:
  OPENWRT_VERSION: 25.12.2
  OPENWRT_TARGET: x86
  OPENWRT_SUBTARGET: 64

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Fix script permissions
        run: |
          #chmod +x root/etc/init.d/AdGuardHome
          #chmod +x root/usr/share/AdGuardHome/*.sh
          #chmod +x root/usr/libexec/rpcd/luci.adguardhome


      - name: Set commit id
        id: commit
        run: echo "id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            rsync \
            swig \
            unzip \
            zstd \
            zlib1g-dev \
            file \
            wget \
            python3 \
            python3-setuptools

          for pkg in gcc-multilib g++-multilib; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              sudo apt-get install -y "$pkg"
            else
              echo "Skip optional package: $pkg (not available on this runner)"
            fi
          done

      - name: Resolve SDK archive URL
        id: sdk
        run: |
          set -euo pipefail
          if [ "${OPENWRT_VERSION}" = "snapshots" ] || [ "${OPENWRT_VERSION}" = "snapshot" ]; then
            base_url="https://downloads.openwrt.org/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          else
            base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          fi
          resolve_sdk_file() {
            local url="$1"
            wget -qO- "${url}/sha256sums" \
              | awk '{print $2}' \
              | sed -e 's#^\*##' -e 's#^\./##' \
              | grep -E '^openwrt-sdk-.*\.tar\.(zst|xz)$' \
              | head -n1 || true
          }
          sdk_file="$(resolve_sdk_file "${base_url}")"
          if [ -z "${sdk_file}" ] && [ "${OPENWRT_VERSION}" = "snapshots" ]; then
            fallback_base_url="${base_url/snapshots/snapshot}"
            sdk_file="$(resolve_sdk_file "${fallback_base_url}")"
            if [ -n "${sdk_file}" ]; then
              base_url="${fallback_base_url}"
            fi
          fi
          if [ -z "${sdk_file}" ]; then
            echo "Cannot locate SDK archive under ${base_url}" >&2
            exit 1
          fi
          echo "sdk_url=${base_url}/${sdk_file}" >> "${GITHUB_OUTPUT}"

      - name: Download and extract OpenWrt SDK
        run: |
          set -euo pipefail
          wget -O sdk.tar "${{ steps.sdk.outputs.sdk_url }}"
          mkdir -p sdk
          case "${{ steps.sdk.outputs.sdk_url }}" in
            *.tar.zst)
              if command -v unzstd >/dev/null 2>&1; then
                tar --use-compress-program=unzstd -xf sdk.tar -C sdk --strip-components=1
              else
                tar --zstd -xf sdk.tar -C sdk --strip-components=1
              fi
              ;;
            *.tar.xz) tar -xJf sdk.tar -C sdk --strip-components=1 ;;
            *) echo "Unsupported SDK archive format" >&2; exit 1 ;;
          esac

      - name: Prepare package feed
        run: |
          set -euo pipefail
          mkdir -p sdk/package/luci-app-adguardhome
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'sdk' \
            --exclude 'artifacts' \
            ./ sdk/package/luci-app-adguardhome/

      - name: Build package
        run: |
          set -euo pipefail
          cd sdk
          ./scripts/feeds update -a
          rm -rf feeds/luci/applications/luci-app-adguardhome
          ./scripts/feeds install -a -f
          test -f package/luci-app-adguardhome/Makefile
          make defconfig
          make package/luci-app-adguardhome/compile V=s -j"$(nproc)"


      - name: Collect luci-app-adguardhome APK artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts
          COMMIT_ID="${{ steps.commit.outputs.id }}"
          APK_SRC=$(find sdk/bin/packages -type f -name 'luci-app-adguardhome*.apk' | head -n1)
          cp -v "$APK_SRC" "artifacts/luci-app-adguardhome-${COMMIT_ID}.apk"

      - name: Verify APK exists
        run: |
          set -euo pipefail
          test -n "$(find artifacts -type f -name 'luci-app-adguardhome-*.apk')"



      - name: Create tag for release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          TAG="luci-app-adguardhome-${{ steps.commit.outputs.id }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: luci-app-adguardhome-${{ steps.commit.outputs.id }}
          name: "luci-app-adguardhome-${{ steps.commit.outputs.id }}"
          files: artifacts/luci-app-adguardhome-${{ steps.commit.outputs.id }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
